<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ad Command — Meta Ads Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <!-- ═══ LOGIN SCREEN ═══ -->
  <div id="login-screen" class="login-screen"></div>

  <!-- ═══ DASHBOARD ═══ -->
  <div id="app-layout" class="app-layout" style="display:none;">

    <!-- ═══ SIDEBAR (desktop) ═══ -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="dot"></span>
        <span class="sidebar-logo-text">Ad Command</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Command</div>
          <a href="#overview" class="nav-item active" data-page="overview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span class="nav-label">Overview</span>
          </a>
          <a href="#intelligence" class="nav-item" data-page="intelligence">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15l3-3 3 2 5-7"/></svg>
            <span class="nav-label">Decision Center</span>
          </a>
          <a href="#campaigns" class="nav-item" data-page="campaigns">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            <span class="nav-label">Campaigns</span>
          </a>
          <a href="#ai" class="nav-item" data-page="ai">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            <span class="nav-label">Recommendations</span>
            <span class="nav-badge" id="ai-badge" style="display:none">0</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Workspace</div>
          <a href="#adsets" class="nav-item" data-page="adsets">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4"/></svg>
            <span class="nav-label">Ad Sets</span>
          </a>
          <a href="#ads" class="nav-item" data-page="ads">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <span class="nav-label">Ads</span>
          </a>
          <a href="#reports" class="nav-item" data-page="reports">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M8 17V9"/><path d="M13 17V5"/><path d="M18 17v-6"/></svg>
            <span class="nav-label">Reports</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">System</div>
          <a href="#logs" class="nav-item" data-page="logs">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
            <span class="nav-label">Action Log</span>
          </a>
          <a href="#admin" class="nav-item" data-page="admin" id="nav-admin" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span class="nav-label">Admin</span>
          </a>
          <a href="#settings" class="nav-item" data-page="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="nav-label">Settings</span>
          </a>
        </div>
      </nav>

      <!-- User / Logout -->
      <div class="sidebar-account">
        <div class="sidebar-account-avatar" id="user-avatar">K</div>
        <div class="sidebar-account-body">
          <div class="sidebar-account-name" id="user-info"></div>
          <div class="sidebar-account-role" id="user-role">Operator</div>
          <button class="btn btn-sm sidebar-logout" data-app-action="logout">Sign Out</button>
        </div>
      </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <main class="main-content">
      <header class="page-header">
        <h1 id="page-title" class="page-title">Overview</h1>
        <div class="page-actions">
          <span class="text-muted" style="font-size: 0.78rem;" id="header-time"></span>
          <a href="#settings" class="btn btn-sm" data-page="settings">Settings</a>
        </div>
      </header>

      <div class="page-body" id="page-body">
        <div class="loading">Loading</div>
      </div>
    </main>

    <!-- ═══ MOBILE BOTTOM NAV ═══ -->
    <nav class="mobile-nav">
      <a href="#overview" class="mobile-nav-item active" data-page="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Overview</span>
      </a>
      <a href="#campaigns" class="mobile-nav-item" data-page="campaigns">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        <span>Campaigns</span>
      </a>
      <a href="#ai" class="mobile-nav-item" data-page="ai">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <span>AI</span>
        <span class="nav-badge" id="ai-badge-mobile" style="display:none; position:absolute; top:2px; right:12px;">0</span>
      </a>
      <a href="#intelligence" class="mobile-nav-item" data-page="intelligence">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 3v18h18"/><path d="M7 15l3-3 3 2 5-7"/></svg>
        <span>Decide</span>
      </a>
      <a href="#admin" class="mobile-nav-item" data-page="admin" id="nav-admin-mobile" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span>Admin</span>
      </a>
      <a href="#" class="mobile-nav-item" data-app-action="toggle-mobile-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        <span>More</span>
      </a>
    </nav>

    <!-- Mobile "More" menu -->
    <div id="mobile-more-menu" class="mobile-more-menu" style="display:none;">
      <a href="#" data-app-nav="reports">Client Report</a>
      <a href="#" data-app-nav="adsets">Ad Sets</a>
      <a href="#" data-app-nav="ads">Ads</a>
      <a href="#" data-app-nav="logs">Action Log</a>
      <a href="#" data-app-nav="settings">Settings</a>
      <a href="#" data-app-action="logout" style="color: var(--red);">Sign Out</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/core/session.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/app-state.js"></script>
  <script src="/js/core/api-runtime.js"></script>
  <script src="/js/core/format.js"></script>
  <script src="/js/core/data-health.js"></script>
  <script src="/js/core/metaCooldown.js"></script>
  <script src="/js/core/ui.js"></script>
  <script src="/js/core/ux-patterns.js"></script>
  <script src="/js/core/async-section.js"></script>
  <script src="/js/core/dashboard-metrics.js"></script>
  <script src="/js/core/editor-utils.js"></script>
  <script src="/js/core/page-filters.js"></script>
  <script src="/js/core/bulk-selection.js"></script>
  <script src="/js/core/row-actions.js"></script>
  <script src="/js/core/navigation.js"></script>
  <script src="/js/core/layout.js"></script>
  <script src="/js/core/auth-ui.js"></script>
  <script src="/js/core/header-status.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/overview.js"></script>
  <script src="/js/reports.js"></script>
  <script src="/js/intelligence.js"></script>
  <script src="/js/campaigns.js"></script>
  <script src="/js/adsets.js"></script>
  <script src="/js/ads/bulk.js"></script>
  <script src="/js/ads/creative.js"></script>
  <script src="/js/ads/actions.js"></script>
  <script src="/js/ads/editor.js"></script>
  <script src="/js/ads.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/logs.js"></script>
  <script src="/js/admin/accounts.js"></script>
  <script src="/js/admin/users.js"></script>
  <script src="/js/admin/sessions.js"></script>
  <script src="/js/admin/data-health.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/settings.js"></script>

</body>
</html>
