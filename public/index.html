<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Ads Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <div class="app-layout">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="dot"></span>
        Ad Command
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Dashboard</div>
          <a href="#overview" class="nav-item active" data-page="overview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Overview
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Ads Manager</div>
          <a href="#campaigns" class="nav-item" data-page="campaigns">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            Campaigns
          </a>
          <a href="#adsets" class="nav-item" data-page="adsets">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m-7.07-15.07l2.83 2.83m8.48 8.48l2.83 2.83M1 12h4m14 0h4m-15.07 7.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
            Ad Sets
          </a>
          <a href="#ads" class="nav-item" data-page="ads">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            Ads
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Intelligence</div>
          <a href="#ai" class="nav-item" data-page="ai">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 1.1-.9 2-2 2h-4a2 2 0 0 1-2-2 4 4 0 0 1 4-4z"/><path d="M12 8v8"/><path d="M8 12h8"/><circle cx="12" cy="20" r="2"/></svg>
            AI Analyst
            <span class="nav-badge" id="ai-badge" style="display:none">0</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">System</div>
          <a href="#logs" class="nav-item" data-page="logs">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
            Action Log
          </a>
          <a href="#settings" class="nav-item" data-page="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
        </div>
      </nav>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <main class="main-content">
      <header class="page-header">
        <h1 id="page-title" class="page-title">Overview</h1>
        <div class="page-actions">
          <span class="text-muted" style="font-size: 0.78rem;" id="header-time"></span>
        </div>
      </header>

      <div class="page-body" id="page-body">
        <div class="loading">Loading</div>
      </div>
    </main>
  </div>

  <!-- Scripts (order matters) -->
  <script src="/js/app.js"></script>
  <script src="/js/overview.js"></script>
  <script src="/js/campaigns.js"></script>
  <script src="/js/adsets.js"></script>
  <script src="/js/ads.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/logs.js"></script>
  <script src="/js/settings.js"></script>

  <script>
    // Update header clock
    function updateClock() {
      const el = document.getElementById('header-time');
      if (el) {
        el.textContent = new Date().toLocaleString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Update AI badge count
    async function updateAIBadge() {
      try {
        const res = await apiGet(`/ai/recommendations?accountId=${ACCOUNT_ID}&status=pending`);
        const count = (res.data || []).length;
        const badge = document.getElementById('ai-badge');
        if (count > 0) {
          badge.textContent = count;
          badge.style.display = 'inline';
        } else {
          badge.style.display = 'none';
        }
      } catch (e) { /* silent */ }
    }
    updateAIBadge();
    setInterval(updateAIBadge, 60000);
  </script>
</body>
</html>
