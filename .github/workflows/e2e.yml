name: E2E

on:
  pull_request:
    paths:
      - 'public/**'
      - 'server/**'
      - 'tests/e2e/**'
      - 'scripts/seedE2eDb.js'
      - 'playwright.config.js'
      - 'package*.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: meta_dashboard_e2e
          POSTGRES_USER: meta_dash
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://meta_dash:password@localhost:5432/meta_dashboard_e2e
      SESSION_SIGNING_SECRET: e2e-session-secret
      ACCOUNT_TOKEN_ENCRYPTION_SECRET: e2e-account-token-secret
      READ_ONLY: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prepare database
        run: |
          psql "$DATABASE_URL" -f sql/schema.sql
          for file in $(ls sql/v*.sql | sort -V); do
            psql "$DATABASE_URL" -f "$file"
          done

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
